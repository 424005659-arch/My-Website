<!DOCTYPE html>
<html lang="en">
<head>

<body>

    <header>
        <div class="header-logo">
            <h1>UNDRAFTED 🏀</h1>
        </div>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <h2 style="text-align: center; color: #ff7a00; margin-bottom: 30px;">Contact Us</h2>
        
        <div class="contact-container">
            <section class="card contact-card">
                <h3>Send a Message</h3>
                <form>
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>

                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email address" required>

                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Write your message here" required></textarea>

                    <button type="submit">Submit</button>
                </form>
            </section>

            <section class="card contact-info-section">
                <h3 style="color: #ff7a00; margin-top: 0;">Contact Details</h3>
                <p><strong>Name:</strong> Keanu Sean Gabuya</p>
                <p><strong>Email:</strong> keanu.gabuya20@gmail.com</p>
                <p><strong>Phone:</strong> 0912-345-6789</p>
                <p><strong>Address:</strong> 835 B.Mayor St. Malibay, Pasay City</p>
            </section>
        </div>
    </main>

    <footer>
        <p>© 2026 UNDRAFTED</p>
    </footer>
